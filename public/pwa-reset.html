<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reinitialisation Djimera</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #f8f4ef;
            color: #3b2418;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        main {
            width: min(92vw, 420px);
            padding: 28px;
            border: 1px solid #eadfcc;
            border-radius: 12px;
            background: #fff;
            box-shadow: 0 18px 45px rgba(59, 36, 24, .12);
            text-align: center;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 22px;
        }

        p {
            margin: 0 0 20px;
            color: #6f4b2f;
            line-height: 1.5;
        }

        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 0 18px;
            border-radius: 8px;
            background: #7f1d1d;
            color: #fff;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main>
        <h1>Cache reinitialise</h1>
        <p id="status">Nettoyage de la version iPhone en cours...</p>
        <a href="/" id="home">Retour a l'application</a>
    </main>

    <script>
        async function resetPwa() {
            try {
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    await Promise.all(registrations.map((registration) => registration.unregister()));
                }

                if ('caches' in window) {
                    const keys = await caches.keys();
                    await Promise.all(keys.map((key) => caches.delete(key)));
                }

                localStorage.clear();
                sessionStorage.clear();

                document.getElementById('status').textContent = 'Termine. Ouvrez l’application a nouveau.';
            } catch (error) {
                document.getElementById('status').textContent = 'Nettoyage partiel termine. Vous pouvez revenir a l’application.';
            }
        }

        resetPwa();
    </script>
</body>
</html>
