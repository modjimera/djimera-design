<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Djiméra Design Manager - Hors ligne</title>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #f8f4ef 0%, #eadfcc 48%, #3b2418 100%);
            color: #3b2418;
            font-family: Arial, sans-serif;
        }
        main {
            width: min(86vw, 420px);
            padding: 28px;
            border: 1px solid rgba(198, 156, 72, .55);
            border-radius: 12px;
            background: rgba(255, 250, 243, .94);
            text-align: center;
            box-shadow: 0 24px 70px rgba(59, 36, 24, .24);
        }
        img {
            width: 110px;
            height: 110px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid rgba(198, 156, 72, .6);
        }
        h1 {
            margin: 18px 0 8px;
            font-size: 24px;
        }
        p {
            margin: 0;
            color: #76685d;
            line-height: 1.55;
        }
    </style>
</head>
<body>
    <main>
        <img src="/icons/icon-192x192.png" alt="Djiméra Design">
        <h1>Mode hors ligne</h1>
        <p>La connexion est indisponible. Les pages déjà ouvertes peuvent rester accessibles, puis les données se mettront à jour dès le retour du réseau.</p>
    </main>
</body>
</html>
